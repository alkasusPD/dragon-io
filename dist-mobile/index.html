<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#082d43" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DRAGON.IO" />
  <title>DRAGON.IO</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <canvas id="game" width="540" height="960" data-i18n-aria-label="aria.gameCanvas"></canvas>
    <div id="hud" class="game-hud" data-i18n-aria-label="aria.gameInfo">
      <div class="hero-hud">
        <div class="hero-portrait" aria-hidden="true"></div>
        <div class="hero-bars">
          <div class="level-frame"><div id="hudHp" class="level-fill"></div><span id="hudLevel" class="level-text"></span></div>
        </div>
      </div>
      <div class="run-hud">
        <div class="stat-chip"><span class="coin-icon" aria-hidden="true"></span><span id="hudScore">00000</span></div>
      </div>
      <div id="waveProgress" class="wave-progress" aria-hidden="true"></div>
      <button id="pause" class="pause-button" type="button" data-i18n-aria-label="aria.pause"><span></span><span></span></button>
    </div>
    <button id="ultimate" class="ultimate-control" type="button">
      <span class="ultimate-icon">✦</span>
      <span class="ultimate-label"></span>
    </button>
    <section id="titleScreen" class="screen title-screen visible" data-i18n-aria-label="aria.titleScreen">
      <button id="titleStart" class="screen-hitbox title-start" type="button" data-i18n-aria-label="aria.titleStart"></button>
    </section>
    <section id="lobbyScreen" class="screen lobby-screen" data-i18n-aria-label="aria.lobbyScreen">
      <div class="lobby-top-hud" aria-label="로비 상단 정보">
        <div class="lobby-account">
          <div class="lobby-profile-frame" data-frame="bronze">
            <div class="lobby-profile-image" data-profile="dragon"></div>
          </div>
          <div class="lobby-account-meta">
            <div class="lobby-account-name">Dragon Slayer</div>
            <div class="lobby-account-level">LV. 65</div>
          </div>
        </div>
        <div class="lobby-wallet">
          <div class="lobby-currency lobby-gold" aria-label="골드">
            <span class="lobby-currency-icon"></span>
            <span class="lobby-currency-value">125,634</span>
          </div>
          <div class="lobby-currency lobby-diamond" aria-label="다이아">
            <span class="lobby-currency-icon"></span>
            <span class="lobby-currency-value">8,950</span>
          </div>
        </div>
      </div>
      <button id="lobbyPlay" class="screen-hitbox lobby-play" type="button" data-i18n-aria-label="aria.lobbyPlay"></button>
      <button id="lobbyShop" class="screen-hitbox lobby-tab lobby-tab-shop" type="button" data-i18n-aria-label="aria.lobbyShop"></button>
      <button id="lobbyHome" class="screen-hitbox lobby-tab lobby-tab-home" type="button" data-i18n-aria-label="aria.lobbyHome"></button>
      <button id="lobbyUpgrade" class="screen-hitbox lobby-tab lobby-tab-upgrade" type="button" data-i18n-aria-label="aria.lobbyUpgrade"></button>
    </section>
    <section id="upgradeScreen" class="screen upgrade-screen" aria-label="업그레이드 화면">
      <div class="upgrade-top-hud">
        <button id="upgradeBack" class="upgrade-back" type="button" aria-label="로비로 돌아가기">‹</button>
        <div>
          <p class="upgrade-kicker">SANCTUARY WORKSHOP</p>
          <h1>업그레이드</h1>
        </div>
        <div class="upgrade-wallet">
          <div class="lobby-currency lobby-gold" aria-label="골드"><span class="lobby-currency-icon"></span><span class="lobby-currency-value">125,634</span></div>
          <div class="lobby-currency lobby-diamond" aria-label="다이아"><span class="lobby-currency-icon"></span><span class="lobby-currency-value">8,950</span></div>
        </div>
      </div>
      <div class="upgrade-page-content">
        <section class="stat-node-board" aria-label="능력치 노드 50단계">
          <div class="stat-node-summary">
            <div class="stat-badge attack"><span></span></div>
            <div>
              <strong>능력치 노드</strong>
              <p>공격력 · 체력 · 공용을 각각 50단계까지 성장시킵니다.</p>
            </div>
            <em id="statNodeLevel">총 25</em>
          </div>
          <div id="statNodeScroll" class="stat-node-scroll">
            <div class="stat-node-lanes" aria-label="능력치별 세로 노드 라인">
              <div class="stat-node-lane attack" data-stat-type="attack">
                <div class="stat-node-lane-title"><span></span><strong>공격력</strong></div>
                <div id="attackNodeRail" class="stat-node-rail"></div>
              </div>
              <div class="stat-node-lane health" data-stat-type="health">
                <div class="stat-node-lane-title"><span></span><strong>체력</strong></div>
                <div id="healthNodeRail" class="stat-node-rail"></div>
              </div>
              <div class="stat-node-lane utility" data-stat-type="utility">
                <div class="stat-node-lane-title"><span></span><strong>공용</strong></div>
                <div id="utilityNodeRail" class="stat-node-rail"></div>
              </div>
            </div>
          </div>
          <div class="stat-node-footer">
            <div>
              <span id="statNodeFooterLabel">선택 노드</span>
              <strong id="statNodeNext">공격력 Lv.13</strong>
              <p id="statNodeEffect" class="stat-node-effect">공격력 +2%</p>
            </div>
            <button id="statNodeCost" type="button">골드 4,200</button>
          </div>
        </section>
      </div>
      <nav class="upgrade-bottom-nav" aria-label="하단 메뉴">
        <button id="upgradeShopTab" type="button"><span>상점</span></button>
        <button id="upgradeHomeTab" class="home" type="button"><span>로비</span></button>
        <button class="active" type="button"><span>업그레이드</span></button>
      </nav>
    </section>
    <section id="countdown" class="countdown" aria-live="assertive" data-i18n-aria-label="aria.countdown">
      <p data-i18n="countdown.flight"></p>
      <strong id="countdownNumber">3</strong>
    </section>
    <section id="upgrade" class="panel">
      <p class="eyebrow" data-i18n="upgrade.eyebrow"></p>
      <h2 data-i18n="upgrade.title"></h2>
      <div id="cards"></div>
      <button id="reroll" class="reroll-button" type="button"></button>
    </section>
    <section id="gameover" class="panel">
      <p class="eyebrow" data-i18n="result.eyebrow"></p>
      <h2 data-i18n="result.title"></h2>
      <p id="result"></p>
      <div class="result-actions">
        <button id="backLobby" data-i18n="result.backLobby"></button>
        <button id="restart" data-i18n="result.restart"></button>
      </div>
    </section>
    <section id="pausePanel" class="panel">
      <p class="eyebrow" data-i18n="pause.eyebrow"></p>
      <h2 data-i18n="pause.title"></h2>
      <button id="resume" data-i18n="pause.resume"></button>
      <button id="skipBoss" class="cheat-button" data-i18n="cheat.boss"></button>
    </section>
  </main>
  <script>
    if (matchMedia('(pointer: coarse)').matches) {
      const gameCanvas = document.querySelector('#game');
      const viewport = window.visualViewport;
      const width = viewport?.width || innerWidth;
      const height = viewport?.height || innerHeight;
      gameCanvas.height = Math.max(960, Math.round(gameCanvas.width * height / width));
    }
  </script>
  <script src="strings.js?v=20260708-09"></script>
  <script src="game.js?v=20260708-09"></script>
</body>
</html>
